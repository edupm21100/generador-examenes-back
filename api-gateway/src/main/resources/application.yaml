server:
  port: 8082

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      server:
        webmvc:
          routes:
          - id: modulo-seguridad
            uri: lb://EXAMEN-BACKEND
            predicates:
              - Path=/auth/**
          - id: modulo-usuarios
            uri: lb://EXAMEN-BACKEND
            predicates:
              - Path=/usuarios/**, /roles/**
          - id: modulo-incidencias
            uri: lb://EXAMEN-INCIDENCIAS
            predicates:
              - Path=/incidencias/**

eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/