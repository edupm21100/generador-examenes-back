services:
  # --- 1. INFRAESTRUCTURA CORE ---
  db:
    image: mysql:8.0.33
    container_name: examen_mysql
    restart: always
    environment:
      MYSQL_DATABASE: examenes
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_USER: eduardo
      MYSQL_PASSWORD: eduardopassword
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  eureka:
    build: ../eureka-server
    container_name: examen_eureka
    restart: on-failure
    ports:
      - "8761:8761"

  gateway:
    build: ../api-gateway
    container_name: examen_gateway
    restart: on-failure
    ports:
      - "8082:8080" # Ajusta al puerto que exponga tu Gateway internamente
    depends_on:
      - eureka

  # --- 2. SEPARACIÓN LÓGICA DEL MONOLITO ---
  backend_auth:
    build: .
    container_name: ms_auth_logico
    restart: on-failure
    depends_on:
      db:
        condition: service_healthy
      eureka:
        condition: service_started
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://db:3306/examenes?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      - SPRING_DATASOURCE_USERNAME=eduardo
      - SPRING_DATASOURCE_PASSWORD=eduardopassword
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka:8761/eureka/
      - SPRING_APPLICATION_NAME=MS-AUTH # Nombre en Eureka

  backend_usuarios:
    build: .
    container_name: ms_usuarios_logico
    restart: on-failure
    depends_on:
      db:
        condition: service_healthy
      eureka:
        condition: service_started
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://db:3306/examenes?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      - SPRING_DATASOURCE_USERNAME=eduardo
      - SPRING_DATASOURCE_PASSWORD=eduardopassword
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka:8761/eureka/
      - SPRING_APPLICATION_NAME=MS-USUARIOS

  backend_roles:
    build: .
    container_name: ms_roles_logico
    restart: on-failure
    depends_on:
      db:
        condition: service_healthy
      eureka:
        condition: service_started
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://db:3306/examenes?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      - SPRING_DATASOURCE_USERNAME=eduardo
      - SPRING_DATASOURCE_PASSWORD=eduardopassword
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka:8761/eureka/
      - SPRING_APPLICATION_NAME=MS-ROLES

  backend_examenes:
    build: .
    container_name: ms_examenes_logico
    restart: on-failure
    depends_on:
      db:
        condition: service_healthy
      eureka:
        condition: service_started
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://db:3306/examenes?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      - SPRING_DATASOURCE_USERNAME=eduardo
      - SPRING_DATASOURCE_PASSWORD=eduardopassword
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka:8761/eureka/
      - SPRING_APPLICATION_NAME=MS-EXAMENES

  backend_incidencias:
    build: .
    container_name: ms_incidencias_logico
    restart: on-failure
    depends_on:
      db:
        condition: service_healthy
      eureka:
        condition: service_started
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://db:3306/examenes?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      - SPRING_DATASOURCE_USERNAME=eduardo
      - SPRING_DATASOURCE_PASSWORD=eduardopassword
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka:8761/eureka/
      - SPRING_APPLICATION_NAME=MS-INCIDENCIAS

volumes:
  mysql_data: